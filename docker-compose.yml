services:
  gold-api:
    build: .
    image: gold-api:latest
    container_name: gold-api
    restart: always
    ports:
      - "9987:8080"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DATA_SOURCE: finnhub
      DEFAULT_SYMBOL: XAU
      FINNHUB_XAU_JPY_SYMBOL: OANDA:XAU_JPY
      FINNHUB_USD_JPY_SYMBOL: OANDA:USD_JPY
      FINNHUB_STREAM_TIMEOUT_SECONDS: "8"
      ALPHA_VANTAGE_ENDPOINT: https://www.alphavantage.co/query
      ALPHA_VANTAGE_FROM_CURRENCY: USD
      ALPHA_VANTAGE_TO_CURRENCY: CNY
      ALPHA_VANTAGE_CACHE_TTL_SECONDS: "3600"
      USD_CNY_FALLBACK_RATE: "6.7582"
      HISTORY_RETENTION_DAYS: "2"
      TZ: Asia/Shanghai
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:7
    container_name: gold-redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./redis-data:/data
